<ion-header [translucent]="true">
  <ion-toolbar color="secondary">
    <ion-title>Menu Principal</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Menu Principal</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="menu-container">
    <ion-button class="menu-button" expand="block" (click)="navegarParaCadastro()">Tela de Inscrição</ion-button>

    <ion-button class="menu-button" expand="block" (click)="navegarParaCobrancas()">Tela de Cobranças</ion-button>

    <ion-button class="menu-button" expand="block" (click)="navegarParaPagamentos()">Tela de Pagamentos</ion-button>
  </div>
</ion-content>
