<ion-header [translucent]="true">
  <ion-toolbar color="tertiary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/menu"></ion-back-button>
    </ion-buttons>
    <ion-title>Cobranças</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar color="tertiary">
      <ion-title size="large">Cobranças</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="form-container">
    <ion-item>
      <ion-label position="floating">Devedor</ion-label>
      <ion-input [(ngModel)]="cliente" type="text"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Vencimento</ion-label>
      <ion-input [(ngModel)]="vencimento" type="date"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Recebimento</ion-label>
      <ion-input [(ngModel)]="pagamento" type="date"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="floating">Quantia</ion-label>
      <ion-input [(ngModel)]="valor" type="number"></ion-input>
    </ion-item>

    <ion-button expand="full" (click)="cadastrar()">Guardar</ion-button>
  </div>

  <div class="list-container">
    <ion-list>
      <ion-item *ngFor="let item of listaReceber; let i = index">
        <ion-label>
          <h2>{{item.cliente}}</h2>
          <p>Venc: {{item.vencimento}} - Recb: {{item.pagamento}} - R$ {{item.valor}}</p>
        </ion-label>
        <ion-button fill="clear" color="danger" (click)="excluir(i)">
          <ion-icon name="trash-outline"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
